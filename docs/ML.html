<!DOCTYPE html>
<html>
<head>
  <title>PMO Prediction</title>
</head>
<body>

  <h2>PMO Prediction</h2>

  <label>Model:</label>
  <select id="model">
    <option value="RF">Random Forest</option>
    <option value="GB">Gradient Boosting</option>
  </select>

  <br><br>

  <label>Number of weeks:</label>
  <select id="numWeeks" onchange="createWeekInputs()">
    <option value="1">1 week</option>
    <option value="2" selected>2 weeks</option>
    <option value="3">3 weeks</option>
    <option value="4">4 weeks</option>
    <option value="5">5 weeks</option>
  </select>

  <div id="weekInputs"></div>

  <br>

  <button onclick="getPrediction()">Predict</button>

  <h3>Result:</h3>
  <p id="result"></p>

  <script>
    function createWeekInputs() {
      const numWeeks = parseInt(document.getElementById("numWeeks").value);
      const container = document.getElementById("weekInputs");

      container.innerHTML = "";

      for (let i = 1; i <= numWeeks; i++) {
        container.innerHTML += `
          <br>
          <label>Week ${i}:</label>
          <input type="number" id="week${i}" step="any">
        `;
      }
    }

    async function getPrediction() {
      const model = document.getElementById("model").value;
      const numWeeks = parseInt(document.getElementById("numWeeks").value);

      let weeks = [];

      for (let i = 1; i <= numWeeks; i++) {
        const value = parseFloat(document.getElementById(`week${i}`).value);

        if (isNaN(value)) {
          document.getElementById("result").innerText = `Please enter a value for Week ${i}.`;
          return;
        }

        weeks.push(value);
      }

      const response = await fetch("/predict", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: model,
          weeks: weeks,
          threshold: 0.5
        })
      });

      const data = await response.json();

      if (data.error) {
        document.getElementById("result").innerText = "Error: " + data.error;
      } else {
        document.getElementById("result").innerText =
          "Prediction: " + data.predicted_label +
          " | Probability: " + data.probability.toFixed(4) +
          " | PMO: " + data.PMO;
      }
    }

    createWeekInputs();
  </script>

</body>
</html>
